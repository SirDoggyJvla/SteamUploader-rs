name: Build and Release

on:
  push:
    tags:
      - "v*" # triggers when a tag starting with "v" is pushed, e.g. "v1.0.0"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    steps:
      - uses: actions/checkout@v4

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Clean build artifacts
        run: cargo clean

      - name: Build
        run: cargo build --release

      - name: Zip binary and Steamworks SDK (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir release
          cp target/release/SteamUploader release/
          # Copy Steamworks SDK files (adjust the path as needed)
          cp -r steamworks-rs/steamworks-sys/lib/steam/redistributable_bin/linux64/libsteam_api.so release/

          cd release
          zip -j SteamUploader-linux.zip *

      - name: Zip binary and Steamworks SDK (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          mkdir release
          Copy-Item target\release\SteamUploader.exe release\
          # Copy Steamworks SDK files (adjust the path as needed)
          Copy-Item steamworks-rs\steamworks-sys\lib\steam\redistributable_bin\win64\steam_api64.dll release\
          Copy-Item steamworks-rs\steamworks-sys\lib\steam\redistributable_bin\win64\steam_api64.lib release\

          cd release
          Compress-Archive -Path * -DestinationPath SteamUploader-windows.zip

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: SteamUploader-${{ matrix.os }}
          path: release/SteamUploader-*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-files/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
